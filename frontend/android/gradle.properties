org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Workaround for Kotlin incremental compilation errors when dependencies
# live on a different root (user pub cache on C: vs project on E:).
# Disabling Kotlin incremental compilation prevents daemon cache close errors
# observed during Gradle Kotlin daemon compilation on Windows.
kotlin.incremental=false
