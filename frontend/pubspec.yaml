name: hearclear
description: "HearClear - Context-Aware Hearing Companion App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  speech_to_text: ^7.0.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  record: ^6.0.0
  tflite_flutter: ^0.11.0
  vibration: ^2.0.0
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
